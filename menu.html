<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyenlong メ LiOS</title>
    <link rel="stylesheet" href="../styles/menu.css">
    <link rel="stylesheet" href="../styles/transitions.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <!-- Thêm class page-container và rotate-in để hiệu ứng xoay khi vào -->
    <div class="container page-container rotate-in" id="appContainer">
        <header>
            <div>
                <h1>HEADPHONE PLUS 1.0</h1>
                <p class="author">By Nguyenlong メ LiOS<span class="verified">👑</span></p>
            </div>
            <div class="menu">
                <!-- Đổi href thành # và dùng JavaScript để chuyển có hiệu ứng -->
                <a href="#" id="infoLink" class="info-button">
                    <i class="fas fa-info"></i>
                </a>
            </div>
        </header>
        <div class="profile">
            <img src="../images/logo.png" alt="Profile Picture" class="profile-pic">
            <div class="profile-info">
                <h2>Nguyen Hoang Long</h2>
                <p>Menu Hỗ Trợ Kéo Tâm, Tối Ưu Thiết Bị Và Game</p>
            </div>
        </div>
        <div class="options">
            <div class="option">
                <span><i class="fa-solid fa-crosshairs"></i> AIMLOCK</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="option">
                <span><i class="fa-solid fa-gear"></i> FIX RECOIL</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="option">
                <span><i class="fa-solid fa-gun"></i> BÁM ĐẦU</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="option">
                <span><i class="fa-solid fa-shield-virus"></i> ANTIBLACK LIST</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div class="buttons">
            <p>CHẠY TRÊN</p>
            <div class="button-group">
                <a href="freefireth://">FF TH</a>
                <a href="freefiremax://">FF MAX</a>
            </div>
        </div>
        <footer>
            <p>by Nguyenlong メ LiOS</p>
        </footer>
    </div>

    <script>
        // ---- Kiểm tra đăng nhập ----
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = '/index.html';
        }

        // ---- Chuyển sang info.html với hiệu ứng xoay ----
        document.getElementById('infoLink').addEventListener('click', function(e) {
            e.preventDefault();
            const container = document.getElementById('appContainer');
            container.classList.remove('rotate-in');
            container.classList.add('rotate-out');
            setTimeout(() => {
                window.location.href = '../info/info.html';
            }, 600);
        });

        // ---- Service Worker ----
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js').then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function(error) {
                    console.log('ServiceWorker registration failed: ', error);
                });
            });
        }
    </script>
</body>
</html>
