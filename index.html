<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyenlong メ LiOS</title>
    <link rel="stylesheet" href="./styles/style.css">
    <!-- LIÊN KẾT transitions.css -->
    <link rel="stylesheet" href="./styles/transitions.css">
    <link rel="manifest" href="/manifest.json">
    <style>
        /* Giữ nguyên style cũ */
        .message {
            margin-top: 10px;
            font-size: 16px;
            text-align: center;
        }
        .success { color: green; }
        .error { color: red; }

        /* Bổ sung để container hỗ trợ absolute positioning */
        .container {
            position: relative;
            overflow: hidden;
        }

        /* Ghi đè display:none của login-screen từ style.css */
        .login-screen {
            display: block !important;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .login-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Style cho loading text */
        .loading-text {
            margin-top: 30px;
            font-size: 18px;
            letter-spacing: 3px;
            font-weight: 400;
            color: #aaa;
            animation: pulseText 1.5s ease-in-out infinite, fadeIn 0.8s ease forwards 1.2s;
            opacity: 0;
        }
        .loading-text .dot {
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        .loading-text .dot:nth-child(2) { animation-delay: 0.3s; }
        .loading-text .dot:nth-child(3) { animation-delay: 0.6s; }
        @keyframes pulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        @keyframes dotPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Container chính có class page-container -->
    <div class="container page-container" id="appContainer">
        <!-- SPLASH SCREEN: có class screen và active -->
        <div class="splash-screen screen active" id="splashScreen">
            <div class="logo">
                <div class="target">
                    <div class="circle circle1"></div>
                    <div class="circle circle2"></div>
                    <div class="circle circle3"></div>
                    <div class="center-dot"></div>
                    <div class="crosshair crosshair-horizontal"></div>
                    <div class="crosshair crosshair-vertical"></div>
                </div>
                <div class="crown" style="transform: rotate(30deg);">👑</div>
            </div>
            <h1>HEADPHONE PLUS 1.0</h1>
            <p class="loading-text">
                ĐANG TẢI DỮ LIỆU<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
            </p>
        </div>

        <!-- LOGIN SCREEN: có class screen (không active ban đầu) -->
        <div class="login-screen screen" id="loginScreen">
            <h1>NHẬP KEY
                <span class="crown" style="transform: rotate(30deg);">👑</span>
            </h1>
            <div class="input-container">
                <label>KEY</label>
                <input type="text" id="keyInput" placeholder="Nhập Key Vào Đây">
                <div class="login-button">
                    <button onclick="checkKey()">KÍCH HOẠT APP</button>
                </div>
            </div>
            <div class="message" id="message"></div>
            <div class="warning">
                <div class="triangle"></div>
                <p>KEY CHỈ SỬ DỤNG ĐƯỢC TRÊN MỘT THIẾT BỊ</p>
                <p>KHÔNG CHIA SẼ KEY NẾU PHÁT HIỆN SẼ CẤM KEY ĐÓ</p>
            </div>
        </div>
    </div>

    <script>
        // ---- Device ID (giữ nguyên) ----
        let deviceID = localStorage.getItem('deviceID');
        if (!deviceID) {
            deviceID = crypto.randomUUID ? crypto.randomUUID() : 'device-' + Date.now();
            localStorage.setItem('deviceID', deviceID);
        }

        // ---- Kiểm tra key ----
        async function checkKey() {
            const keyInput = document.getElementById('keyInput').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch('https://api-keys-6a7x.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: keyInput, deviceID }),
                });

                const result = await response.json();
                messageDiv.textContent = result.message;

                if (response.status === 200) {
                    messageDiv.className = 'message success';
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('loggedInKey', keyInput);
                    // Hiệu ứng xoay toàn container trước khi chuyển
                    const container = document.getElementById('appContainer');
                    container.classList.add('rotate-out');
                    setTimeout(() => {
                        window.location.href = 'menu/menu.html';
                    }, 600);
                } else {
                    messageDiv.className = 'message error';
                }
            } catch (error) {
                messageDiv.textContent = 'Không Thể Kết Nối Đến Server!';
                messageDiv.className = 'message error';
            }
        }

        // ---- Chuyển Splash → Login sau 3 giây với hiệu ứng xoay ----
        setTimeout(() => {
            const splash = document.getElementById('splashScreen');
            const login  = document.getElementById('loginScreen');

            // Xóa active của splash, thêm class xoay ra
            splash.classList.remove('active');
            splash.classList.add('rotate-out-left');

            // Thêm class xoay vào và active cho login
            login.classList.add('rotate-in-right', 'active');
        }, 3000);

        // ---- Service Worker ----
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/js/sw.js').then(() => {
                console.log('Service Worker registered');
            });
        }
    </script>
</body>
</html>
