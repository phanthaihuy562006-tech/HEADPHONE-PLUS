<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nguyenlong メ LiOS</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/transitions.css" />
    <link rel="manifest" href="/manifest.json" />
    <style>
        .message { margin-top: 10px; font-size: 16px; text-align: center; }
        .success { color: #4caf50; }
        .error   { color: #e74c3c; }
        .container { position: relative; overflow: hidden; }
    </style>
</head>
<body>
    <div class="container page-container" id="appContainer">
        <!-- SPLASH SCREEN -->
        <div class="screen active" id="splashScreen">
            <div class="splash-screen">
                <div class="logo">
                    <div class="target">
                        <div class="circle circle1"></div>
                        <div class="circle circle2"></div>
                        <div class="circle circle3"></div>
                        <div class="center-dot"></div>
                        <div class="crosshair crosshair-horizontal"></div>
                        <div class="crosshair crosshair-vertical"></div>
                    </div>
                    <div class="crown" style="transform: rotate(30deg);">👑</div>
                </div>
                <h1>HEADPHONE PLUS 1.0</h1>
                <p style="position: fixed; bottom: 130px; font-size: 20px;">Version 1.0</p>
            </div>
        </div>

        <!-- LOGIN SCREEN -->
        <div class="screen" id="loginScreen">
            <div class="login-screen" style="display: flex; flex-direction: column; align-items: center; margin-top: 100px;">
                <h1>NHẬP KEY
                    <span class="crown" style="transform: rotate(30deg);">👑</span>
                </h1>
                <div class="input-container">
                    <label>KEY</label>
                    <input type="text" id="keyInput" placeholder="Nhập Key Vào Đây" />
                    <div class="login-button">
                        <button onclick="checkKey()">KÍCH HOẠT APP</button>
                    </div>
                </div>
                <div class="message" id="message"></div>
                <div class="warning">
                    <div class="triangle"></div>
                    <p>KEY CHỈ SỬ DỤNG ĐƯỢC TRÊN MỘT THIẾT BỊ</p>
                    <p>KHÔNG CHIA SẼ KEY NẾU PHÁT HIỆN SẼ CẤM KEY ĐÓ</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---- Device ID ----
        let deviceID = localStorage.getItem('deviceID');
        if (!deviceID) {
            deviceID = crypto.randomUUID ? crypto.randomUUID() : 'device-' + Date.now();
            localStorage.setItem('deviceID', deviceID);
        }

        // ---- Kiểm tra Key ----
        async function checkKey() {
            const keyInput = document.getElementById('keyInput').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch('https://api-keys-6a7x.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: keyInput, deviceID }),
                });

                const result = await response.json();
                messageDiv.textContent = result.message;

                if (response.status === 200) {
                    messageDiv.className = 'message success';
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('loggedInKey', keyInput);
                    // Hiệu ứng xoay toàn container
                    const container = document.getElementById('appContainer');
                    container.classList.add('rotate-out');
                    setTimeout(() => {
                        window.location.href = 'menu/menu.html';
                    }, 600);
                } else {
                    messageDiv.className = 'message error';
                }
            } catch (error) {
                messageDiv.textContent = 'Không Thể Kết Nối Đến Server!';
                messageDiv.className = 'message error';
            }
        }

        // ---- Chuyển Splash → Login với hiệu ứng xoay ----
        setTimeout(() => {
            const splash = document.getElementById('splashScreen');
            const login  = document.getElementById('loginScreen');

            splash.classList.remove('active');
            splash.classList.add('rotate-out-left');

            login.classList.add('rotate-in-right', 'active');
        }, 3000);

        // ---- Service Worker ----
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/js/sw.js').then(() => {
                console.log('Service Worker registered');
            });
        }
    </script>
</body>
</html>
